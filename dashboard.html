<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Tecnológico | TukurForge Tech</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: #0a0a0a; color: white; text-align: center;
        }

        .header {
            padding: 40px 20px; background: linear-gradient(180deg, #151515 0%, #0a0a0a 100%);
            border-bottom: 1px solid #333;
        }
        
        /* Logo TukurForge como principal */
        .main-logo { width: 150px; border-radius: 10px; margin-bottom: 10px; }
        
        h1 { margin: 5px 0; font-size: 1.8em; letter-spacing: 1px; }
        .slogan { color: #555; font-size: 0.9em; text-transform: uppercase; letter-spacing: 2px; }
        .user-welcome { color: #007bff; font-weight: bold; margin-top: 15px; font-size: 1.1em; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px; padding: 40px; max-width: 1200px; margin: 0 auto;
        }

        .card {
            background: #151515; border-radius: 12px; padding: 25px;
            border: 1px solid #222; transition: all 0.3s ease;
            display: flex; flex-direction: column; align-items: center;
        }
        .card:hover { transform: translateY(-8px); border-color: #007bff; box-shadow: 0 10px 30px rgba(0,123,255,0.2); }

        .card img {
            width: 100%; height: 160px; object-fit: contain;
            border-radius: 8px; margin-bottom: 20px;
        }
        
        /* Estilos de fondo según logo */
        .bg-black { background: #000; }
        .bg-white { background: #fff; padding: 5px; box-sizing: border-box; }

        .card h3 { margin: 10px 0 5px; font-size: 1.2em; color: #fff; }
        .card p { font-size: 0.85em; color: #666; margin-bottom: 20px; }

        .btn-access {
            width: 100%; padding: 10px; background: #007bff;
            color: white; border-radius: 5px; text-decoration: none;
            font-size: 0.9em; font-weight: bold; transition: 0.3s;
        }
        .btn-access:hover { background: #0056b3; }

        footer { margin-top: 60px; padding: 30px; border-top: 1px solid #222; color: #333; font-size: 0.75em; }
    </style>
</head>
<body>

    <div class="header">
        <img class="main-logo" src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/TukurForge_Tech/TukurForge_Tech_Negro.jpeg" alt="TukurForge Tech">
        <h1>TUKURFORGE TECH</h1>
        <div class="slogan">Innovación a tu alcance</div>
        <div class="user-welcome" id="user-display">Bienvenido, Socio</div>
    </div>

    <div class="grid-container">
        
        <div class="card">
            <img class="bg-white" src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/Tukur_Edu/Tukur_Edu.jpeg" alt="Tukur-Edu">
            <h3>Tukur-Edu</h3>
            <p>Gestión Educativa</p>
            <a href="#" class="btn-access">ENTRAR</a>
        </div>

        <div class="card">
            <img class="bg-black" src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/SimuTukur/SimuTukur.jpeg" alt="SimuTukur">
            <h3>SimuTukur</h3>
            <p>Simulador de Examen en Línea</p>
            <a href="#" class="btn-access">ENTRAR</a>
        </div>

        <div class="card">
            <img class="bg-black" src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/Forja_Gym/Forja_Gym.jpeg" alt="Forja Gym">
            <h3>Forja Gym</h3>
            <p>Gestión Fitness</p>
            <a href="#" class="btn-access">ENTRAR</a>
        </div>

    </div>

    <footer>
        &copy; 2026 TukurForge Tech | Una división de H Levare Group.<br>
        Hecho con IA para forjar el futuro.
    </footer>

    <script>
        const userName = localStorage.getItem('user_name');
        if (userName) {
            document.getElementById('user-display').innerText = `Bienvenido, ${userName}`;
        }
    </script>
</body>
</html>
