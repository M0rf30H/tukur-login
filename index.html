<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | TukurForge Tech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash-screen" class="hidden">
        <video id="splash-video" muted playsinline>
            <source src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/TukurForge%20Tech/TukurForge%20Tech.mp4" type="video/mp4">
        </video>
    </div>

    <div class="login-container" id="login-box">
        <img id="brand-logo" src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/TukurForge%20Tech/TukurForge%20Tech.jpeg" alt="Logo">
        
        <form id="login-form">
            <h2>Iniciar Sesión</h2>
            <input type="text" id="user-login" placeholder="Usuario (10 caracteres)" required maxlength="10">
            
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Contraseña" required>
                <button type="button" id="togglePassword" class="eye-btn" title="Ver contraseña">👁️</button>
            </div>

            <button type="submit" id="btn-entrar">Entrar</button>
        </form>
        
        <p id="message"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
