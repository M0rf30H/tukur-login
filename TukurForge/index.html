<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Unificado | H Levare Group</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash-screen" class="hidden">
        <video id="splash-video" muted playsinline>
            <source src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/TukurForge_Tech/TukurForge_Tech_Negro.mp4" type="video/mp4">
        </video>
    </div>

    <div class="login-container" id="login-box">
        <img id="brand-logo" src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/TukurForge_Tech/TukurForge_Tech_Negro.jpeg" alt="Logo Corporativo">
        <h2 id="welcome-text">Iniciar Sesión</h2>
        
        <form id="login-form">
            <input type="text" id="user-login" placeholder="Usuario (14 caracteres)" required maxlength="14">
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Contraseña" required>
                <button type="button" id="togglePassword" class="eye-btn">👁️</button>
            </div>
            <button type="submit" id="btn-entrar">Entrar</button>
        </form>
        
        <p id="message"></p>

        <div class="footer-links">
            <a href="#" class="secondary-link">¿Olvidaste tu contraseña?</a><br>
            <a href="registro.html" class="primary-link"><strong>Registrar nuevo aspirante</strong></a>
        </div>

        <div class="corporate-footer">
            <p>Desarrollado por <strong>TukurForge Tech</strong></p>
            <span>División Tecnológica de <strong>H Levare Group</strong></span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
